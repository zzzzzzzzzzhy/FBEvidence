[cryptoMaterial]
certPath = "conf"
useSMCrypto = false

[network]
peers = ["127.0.0.1:20200", "127.0.0.1:20201", "127.0.0.1:20202", "127.0.0.1:20203"]

[account]
keyStoreDir = "account"
